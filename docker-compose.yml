services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: .
    ports:
      - "3001:3000"
    depends_on:
      - backend

  db:
    image: postgres:15
    ports:
      - "5435:5432"
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: